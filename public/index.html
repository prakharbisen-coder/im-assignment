<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Login</h2>
            <p class="login-error" id="loginError"></p>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required />
                <input type="password" id="password" placeholder="Password" required />
                <button type="submit">Sign In</button>
            </form>
            <div class="demo-creds">
                <p><strong>Demo Credentials:</strong></p>
                <p>Admin: <span class="cred" onclick="fillCreds('admin@example.com','admin123')">admin@example.com / admin123</span></p>
                <p>User: <span class="cred" onclick="fillCreds('user@example.com','user123')">user@example.com / user123</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // fill demo creds on click
        function fillCreds(email, pass) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = pass;
        }

        // redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!data.success) {
                    document.getElementById('loginError').textContent = data.error || 'Login failed';
                    return;
                }

                // store token and redirect
                localStorage.setItem('token', data.token);

                // decode role from JWT payload (base64)
                const payload = JSON.parse(atob(data.token.split('.')[1]));
                localStorage.setItem('userId', payload.id);

                window.location.href = 'dashboard.html';
            } catch (err) {
                document.getElementById('loginError').textContent = 'Something went wrong';
                console.error(err);
            }
        });
    </script>
</body>
</html>
